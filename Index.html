<!DOCTYPE html>
<html lang="ru">
<head>

    <title>Пригласить Kokushibo</title>

    <style>
        body {
            background-color: #1a1a1a;

            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .loader {
            text-align: center;
        }
        h1 {
            font-size: 24px;
            margin-bottom: 10px;
        }

        }

    </div>

    <!-- Скрипт-подстраховка для мгновенного редиректа через JS -->

        window.location.href = "https://discord.com/oauth2/authorize?client_id=1266304845833310311";

</html>
